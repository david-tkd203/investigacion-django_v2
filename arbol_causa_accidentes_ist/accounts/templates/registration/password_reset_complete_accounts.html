{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23d97706'/%3E%3Cpath d='M10 22V12l6 4 6-4v10' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <title>Contraseña actualizada</title>
  <link rel="stylesheet" href="{% static 'accidentes/css/login.css' %}">
  <style>
    .card {
      max-width: 560px; 
      margin: 32px auto; 
      background:#fff;
      border-radius:16px;
      text-align:center;
    }
    .status-icon {
      width: 56px; height: 56px; border-radius: 50%;
      display:flex; align-items:center; justify-content:center;
      background:#e6f4ea; margin:0 auto 12px;
    }
    .status-icon svg { width:28px; height:28px; }
    .btn { display:inline-block; padding:10px 16px; border-radius:10px; text-decoration:none; font-weight:600; }
    .btn-primary { background:#5b6cff; color:#fff; margin-top: 20px; }
    .header-center { text-align:center; margin-top: 28px; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="header header-center">
      <div style="width:56px;height:56px;margin:0 auto 16px;background:linear-gradient(135deg,#d97706,#ea580c);border-radius:14px;display:flex;align-items:center;justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12 8 8"/><path d="M12 12 16 8"/><path d="M12 12v6"/></svg>
      </div>
      <h1 class="app-title">Investigación de Accidentes</h1>
    </div>

    <div class="card">
      <div class="status-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"><path d="M20 7L9 18l-5-5" stroke="#1a7f37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2>¡Tu contraseña fue actualizada!</h2>
      <p>Puedes iniciar sesión con tu nueva contraseña.</p>
      <p><a class="btn btn-primary" href="{% url 'accounts:login' %}">Ir a iniciar sesión</a></p>
    </div>
  </div>
</body>
</html>
